# === infra/docker-compose.yml ===

services:
  postgres:
    image: postgres:17-alpine
    container_name: categories-game-postgres
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: categories-game-backend:latest
    container_name: categories-game-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - '${PORT}:${PORT}'
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:${PORT}/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"

  frontend:
    image: categories-game-frontend:latest
    container_name: categories-game-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - '80:80'
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
